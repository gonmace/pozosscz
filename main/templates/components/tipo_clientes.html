{% load static inline_svg %}

<!-- Tarjeta "¿A quiénes atendemos?" (rediseño). Ancho controlado por el grid contenedor. -->
<div class="bg-white border border-base-300 rounded-[18px] p-5 text-center shadow-[0_6px_16px_rgba(30,60,30,.05)] flex flex-col items-center">
    <span class="w-10 h-10 text-primary flex items-center justify-center">
        {% inline_svg_from_media svg.url %}
    </span>
    <div class="font-display font-medium text-[15px] text-base-content/80 mt-2.5">{{ nombre }}</div>
</div>
