{% load static inline_svg zona_links %}

<!-- Tarjeta "Querendones de nuestra tierra" (rediseño). Ancho controlado por el grid contenedor. -->
<div class="bg-white border border-base-300 rounded-[20px] p-6 shadow-[0_8px_20px_rgba(30,60,30,.06)]">
    <span class="w-[52px] h-[52px] rounded-[15px] bg-band flex items-center justify-center mb-3.5 text-primary">
        {% if svg %}
            <span class="w-7 h-7 flex items-center justify-center">{% inline_svg_from_media svg.url %}</span>
        {% endif %}
    </span>
    <h3 class="font-display font-semibold text-lg text-base-content mb-1.5">
        {{ titulo }}
    </h3>
    <p class="text-[14.5px] leading-relaxed text-base-content/60">
        {% if 'cerca' in titulo|lower %}{{ descripcion|link_zonas }}{% else %}{{ descripcion }}{% endif %}
    </p>
</div>
