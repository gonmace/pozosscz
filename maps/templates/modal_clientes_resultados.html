<!-- Modal resultados de clientes (búsqueda por polígono) -->
<dialog id="client-results-modal" class="modal">
  <div class="modal-box w-11/12 max-w-5xl max-h-[85vh] overflow-y-auto bg-base-200">
    <div class="sticky top-0 z-10 bg-base-200 flex items-center justify-between pb-3 mb-1">
      <div class="flex items-center gap-2 flex-wrap">
        <h3 class="font-bold text-lg">Clientes encontrados</h3>
        <span id="modal-client-count" class="badge badge-primary"></span>
        <span id="modal-client-prg" class="badge text-white font-bold" style="background:#2196F3;display:none;"></span>
        <span id="modal-client-eje" class="badge text-white font-bold" style="background:#43A047;display:none;"></span>
        <span id="modal-client-can" class="badge text-white font-bold" style="background:#E53935;display:none;"></span>
        <span id="modal-client-cot" class="badge text-white font-bold" style="background:#FF9800;display:none;"></span>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <button id="export-csv" class="btn btn-sm btn-primary">CSV</button>
        <form method="dialog">
          <button class="btn btn-sm btn-circle btn-ghost text-lg">✕</button>
        </form>
      </div>
    </div>
    <div id="modal-client-list"
         class="grid grid-cols-1 sm:grid-cols-2 rounded-xl items-start"
         style="column-gap: 0.375rem; row-gap: 0.5rem;">
    </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>Cerrar</button></form>
</dialog>
