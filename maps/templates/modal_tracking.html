<style>
  #modalTracking { pointer-events: none; background: transparent !important; z-index: 1000; }
  #draggableTracking { pointer-events: auto; position: relative; z-index: 1; height: fit-content !important; max-height: none !important; overflow-y: visible !important; }
</style>

<dialog id="modal-tracking" class="modal items-start justify-center">
  <div id="draggableTracking"
       class="modal-box relative pt-0 px-0 mt-16 sm:mt-4 w-full sm:w-[600px]"
       style="max-width:95vw;overflow-x:visible;">

    <!-- Header -->
    <div id="modalTrackingHeader"
         class="flex items-center gap-2 cursor-move px-3 h-9 bg-base-300 font-bold text-sm rounded-t-lg select-none">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="shrink-0 opacity-60">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span>Tracking</span>
      <div class="ml-auto flex items-center gap-1">
        <button id="modalTrackingCollapseBtn" type="button"
                class="btn btn-xs btn-ghost px-1" title="Colapsar / Expandir">▼</button>
        <button id="modalTrackingCloseBtn" type="button"
                class="btn btn-xs btn-ghost px-1" title="Cerrar">✕</button>
      </div>
    </div>

    <!-- Contenido -->
    <div id="modalTrackingContent" class="overflow-y-auto" style="max-height:75vh;">

      <!-- Filtros -->
      <div class="flex items-center gap-2 px-3 py-2 border-b border-base-300 flex-wrap">
        <span class="text-xs text-base-content/50">Últimos</span>
        <select id="tracking-sel-dias" class="select select-xs select-bordered w-28">
          <option value="1" selected>1 día</option>
          <option value="3">3 días</option>
          <option value="7">7 días</option>
          <option value="14">14 días</option>
          <option value="30">30 días</option>
        </select>
        {% if camiones %}
        <select id="tracking-sel-camion" class="select select-xs select-bordered flex-1 min-w-[120px]">
          <option value="">Todos</option>
          {% for camion in camiones %}
          <option value="{{ camion.id }}">{{ camion.operador }}</option>
          {% endfor %}
        </select>
        {% endif %}
        <button id="tracking-btn-recargar" class="btn btn-xs btn-ghost btn-square" title="Recargar">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
          </svg>
        </button>
      </div>

      <!-- Lista -->
      <div id="tracking-body" class="px-3 py-2">
        <p class="text-xs text-base-content/40 text-center py-4">Cargando…</p>
      </div>

    </div>
  </div>
</dialog>
