<style>
  #modalEventosCamion { pointer-events: none; background: transparent !important; z-index: 1000; }
  #draggableEventosCamion { pointer-events: auto; position: relative; z-index: 1; height: fit-content !important; max-height: none !important; overflow-y: visible !important; }
  .rotate-90 { transform: rotate(90deg); }
</style>

<dialog id="modal-eventos-camion" class="modal items-start justify-center">
  <div id="draggableEventosCamion"
       class="modal-box relative pt-0 px-0 mt-16 sm:mt-4 w-full sm:w-[780px]"
       style="max-width:95vw;overflow-x:visible;">

    <!-- Header -->
    <div id="modalEventosCamionHeader"
         class="flex items-center gap-2 cursor-move px-3 h-9 bg-base-300 font-bold text-sm rounded-t-lg select-none">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="shrink-0 opacity-60">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
      </svg>
      <span>Eventos camión</span>
      <div class="ml-auto flex items-center gap-1">
        <button id="modalEventosCamionCollapseBtn" type="button"
                class="btn btn-xs btn-ghost px-1" title="Colapsar / Expandir">▼</button>
        <button id="modalEventosCamionCloseBtn" type="button"
                class="btn btn-xs btn-ghost px-1" title="Cerrar">✕</button>
      </div>
    </div>

    <!-- Contenido -->
    <div id="modalEventosCamionContent" class="overflow-y-auto" style="max-height:75vh;">

      <!-- Filtros -->
      <div class="flex items-center gap-2 px-3 py-2 border-b border-base-300 flex-wrap">
        <span class="text-xs text-base-content/50">Últimos</span>
        <select id="eventos-sel-dias" class="select select-xs select-bordered w-28">
          <option value="1">1 día</option>
          <option value="7">7 días</option>
          <option value="14">14 días</option>
          <option value="30" selected>30 días</option>
          <option value="60">60 días</option>
          <option value="90">90 días</option>
        </select>
        {% if camiones %}
        <select id="eventos-sel-camion" class="select select-xs select-bordered flex-1 min-w-[120px]">
          <option value="">Todos los camiones</option>
          {% for camion in camiones %}
          <option value="{{ camion.id }}">{{ camion.operador }}</option>
          {% endfor %}
        </select>
        {% endif %}
        <button id="eventos-btn-recargar" class="btn btn-xs btn-ghost btn-square" title="Recargar">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
          </svg>
        </button>
      </div>

      <!-- Tabla -->
      <div class="overflow-x-auto">
        <table class="table table-xs w-full" style="font-size:11px;">
          <thead>
            <tr style="border-bottom:1px solid rgba(255,255,255,0.08);">
              <th class="px-3 py-2 text-left font-semibold opacity-50 whitespace-nowrap">Hora</th>
              <th class="px-2 py-2 text-left font-semibold opacity-50 whitespace-nowrap">Camión</th>
              <th class="px-2 py-2 text-left font-semibold opacity-50">Tipo</th>
              <th class="px-2 py-2 text-left font-semibold opacity-50">Cliente</th>
              <th class="px-2 py-2 text-center font-semibold opacity-50 whitespace-nowrap">Tanque</th>
              <th class="px-2 py-2 text-right font-semibold opacity-50">Monto</th>
              <th class="px-2 py-2 text-right font-semibold opacity-50">Fact.</th>
              <th class="px-2 py-2 text-center font-semibold opacity-50">QR</th>
              <th class="px-2 py-2 text-left font-semibold opacity-50">Comentario</th>
            </tr>
          </thead>
          <tbody id="eventos-camion-body">
            <tr><td colspan="9" class="text-center py-6 text-xs opacity-40">Cargando…</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</dialog>
