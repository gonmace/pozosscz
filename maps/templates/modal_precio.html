<style>
  #formCost { color: yellow !important; }
  /* Sin backdrop ni capa oscura — solo el box captura eventos */
  /* El dialog necesita z-index propio para superar los controles de Leaflet */
  #modalPrecio { pointer-events: none; background: transparent !important; z-index: 1000; }
  #draggableModal { pointer-events: auto; position: relative; z-index: 1; height: fit-content !important; max-height: none !important; overflow-y: visible !important; }
</style>
<!-- show() abre sin backdrop; pointer-events permite interactuar con el mapa -->
<dialog id="modalPrecio" class="modal items-start justify-center">
  <div
    id="draggableModal"
    class="modal-box relative pt-0 px-0 mt-4"
    style="width:fit-content;max-width:100vw;overflow-x:visible;"
  >
    <!-- Encabezado: título + botón colapso -->
    <div
      id="modalHeader"
      class="flex items-center justify-between cursor-move px-3 h-8 bg-base-300 font-bold text-sm rounded-t-lg select-none"
    >
      <span>Cálculo del Precio</span>
      <button
        id="modalCollapseBtn"
        type="button"
        class="btn btn-xs btn-ghost px-1"
        title="Colapsar / Expandir"
      >▼</button>
    </div>

    <!-- Contenido colapsable -->
    <div id="modalContent" class="mt-3 px-4 pb-4">
      <!-- Tabla de precios -->
      <div class="pr-2">
        <table id="tPrecios" class="table-fixed font-light text-xs text-center" style="width:371px;min-width:371px">
          <colgroup>
            <col style="width:101px"> <!-- Origen/Base -->
            <col style="width:34px">  <!-- Dist -->
            <col style="width:34px">  <!-- T. -->
            <col style="width:34px">  <!-- Comb. -->
            <col style="width:34px">  <!-- Util. -->
            <col style="width:34px">  <!-- Mant. -->
            <col style="width:34px">  <!-- Chofer -->
            <col style="width:34px">  <!-- Precio -->
            <col style="width:22px">  <!-- radio/checkbox -->
          </colgroup>
          <thead>
            <tr>
              <th>Origen /<br>Base</th>
              <th>Dist<br><span class="font-light">(km)</span></th>
              <th>T.<br><span class="font-light">(min)</span></th>
              <th>Comb.<br><span class="font-light">(Bs)</span></th>
              <th>Util.<br><span class="font-light">(Bs)</span></th>
              <th>Mant.<br><span class="font-light">(Bs)</span></th>
              <th>Chofer<br><span class="font-light">(Bs)</span></th>
              <th>Precio<br><span class="font-light">(Bs)</span></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbValores" class="bg-base-100"></tbody>

          <tr><td colspan="9" class="py-1"><hr class="border-base-content/20"/></td></tr>

          <tbody id="tbConstantes" class="bg-base-100"></tbody>
        </table>
        <!-- Notas -->
        <div id="warning" class="text-left text-xs mt-1 space-y-0.5"></div>
      </div>

      <!-- Formulario -->
      <div class="flex flex-col gap-1.5 mt-3">
        <!-- Fila 1: Nombre y Teléfono — teléfono 20% más angosto que nombre -->
        <div class="flex gap-2" style="max-width:382px;">
          <label class="input input-bordered input-sm flex min-w-0" style="flex:5">
            <input id="formName" type="text" class="grow min-w-0" placeholder="Nombre" />
          </label>
          <label class="input input-bordered input-sm flex min-w-0" style="flex:4">
            <input id="formPhone" type="text" class="grow min-w-0" placeholder="Teléfono" />
          </label>
        </div>
        <!-- Fila 2: Precios — ancho máximo igual al de la tabla (382px) -->
        <div class="flex gap-2" style="max-width:382px;">
          <!-- P. Cotizado sistema (readonly) — color naranja COT -->
          <div class="flex flex-col flex-1 min-w-0 gap-0.5">
            <span class="text-xs pl-1" style="color:#FF9800;opacity:0.8">P. Sistema</span>
            <label class="input input-sm flex min-w-0 w-full" style="border:1px solid #FF9800;border-radius:var(--radius-field,0.5rem);opacity:0.75">
              <input id="formPrecioSistema" type="text" class="grow min-w-0 text-xs font-semibold bg-transparent outline-none" style="color:#FF9800;" placeholder="—" readonly />
            </label>
          </div>
          <!-- P. Final (editable) — color amarillo -->
          <div class="flex flex-col flex-1 min-w-0 gap-0.5">
            <span class="text-xs pl-1" style="color:yellow">P. Final</span>
            <label class="input input-sm flex min-w-0 w-full" style="border:1px solid yellow;border-radius:var(--radius-field,0.5rem);">
              <input id="formCost" type="text" class="grow min-w-0 text-xs font-bold bg-transparent outline-none" style="color:yellow;" placeholder="—" />
            </label>
          </div>
        </div>
        <!-- Fila 3: Botones -->
        <div class="flex gap-2 mt-1" style="max-width:382px;">
          <button type="button" id="saveData" class="btn btn-accent btn-sm flex-1">Guardar</button>
          <button type="button" class="btn btn-ghost btn-sm flex-1 border border-base-content/20" onclick="modalPrecio.close()">Cerrar</button>
        </div>
      </div>
    </div>
  </div>
</dialog>
