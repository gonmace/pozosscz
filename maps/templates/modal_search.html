<!-- Buscar Cliente -->
<dialog id="searchClientModal" class="modal items-start justify-center">
  <div class="modal-box w-11/12 max-w-5xl max-h-[90vh] overflow-y-auto bg-base-200">

    <!-- Header sticky -->
    <div class="sticky top-0 z-10 bg-base-200 pb-3 mb-2">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-bold text-lg">Buscar cliente</h3>
        <form method="dialog">
          <button id="closeSearchModal" class="btn btn-sm btn-circle btn-ghost text-lg">✕</button>
        </form>
      </div>
      <div class="flex gap-2">
        <input type="text" id="searchNameInput" placeholder="Nombre…"
               class="input input-sm input-bordered flex-1" />
        <input type="text" id="searchPhoneInput" placeholder="Teléfono…"
               class="input input-sm input-bordered flex-1" />
      </div>
    </div>

    <!-- Resultados como cards -->
    <div id="searchResultsBody"
         class="grid grid-cols-1 sm:grid-cols-2 rounded-xl items-start"
         style="column-gap: 0.375rem; row-gap: 0.5rem;">
    </div>

  </div>
  <form method="dialog" class="modal-backdrop"><button>Cerrar</button></form>
</dialog>
