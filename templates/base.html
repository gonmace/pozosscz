{% load static tailwind_tags meta %}

<!DOCTYPE html>
<html lang="es" data-theme="dark" {% meta_namespaces %}>
  <head>
    <meta charset="utf-8" />
    {% include "meta/meta.html" %}
    <meta name="robots" content="index, follow" />
    <meta name="referrer" content="origin" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="canonical" href="https://pozosscz.com{{ request.path }}" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9612645510546880"
     crossorigin="anonymous"></script>
     <!-- Content MApa de calor -->
     <script src="https://t.contentsquare.net/uxa/7a05b5f9edd25.js"></script>
     <!-- End Content MApa de calor -->

    {% block head %}

    {% endblock %}

    <!-- https://realfavicongenerator.net/ -->
    <link rel="icon" type="image/png" href="{% static 'favicon/favicon-96x96.png' %}" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="{% static 'favicon/favicon.svg' %}" />
    <link rel="shortcut icon" href="{% static 'favicon/favicon.ico' %}" />
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'favicon/apple-touch-icon.png' %}" />
    <link rel="manifest" href="{% static 'favicon/site.webmanifest' %}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% tailwind_css %}
    
    {% block css %}
    {% endblock %}

    {% block javascript_top %}
    {% endblock %}

    <title>{{ meta.title }}</title>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "PozosSCZ - Limpieza de Pozos Sépticos",
      "description": "Servicio profesional de limpieza y succión de pozos sépticos en Santa Cruz de la Sierra, Bolivia. Precio online al instante.",
      "url": "https://pozosscz.com",
      "telephone": "+59171011118",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Santa Cruz de la Sierra",
        "addressRegion": "Santa Cruz",
        "addressCountry": "BO"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": -17.7833,
        "longitude": -63.1821
      },
      "areaServed": {
        "@type": "GeoCircle",
        "geoMidpoint": {
          "@type": "GeoCoordinates",
          "latitude": -17.7833,
          "longitude": -63.1821
        },
        "geoRadius": "100000"
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
        "opens": "08:30",
        "closes": "18:30"
      },
      "priceRange": "$$",
      "serviceType": "Limpieza de pozos sépticos",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Servicios de limpieza de pozos sépticos",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Limpieza de pozo séptico residencial",
              "description": "Limpieza y succión de pozos sépticos para hogares en Santa Cruz"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Limpieza de pozo séptico comercial",
              "description": "Servicio de limpieza para empresas, condominios y negocios"
            }
          }
        ]
      }
    }
    </script>
  </head>

  <body class="{% block body_class %}{% endblock %} h-fit">

    {% block content %}
    {% endblock %}

    {% block js %}
    {% endblock %}
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .catch(function(e) { console.warn('SW:', e); });
        });
      }
    </script>
  </body>
</html>
