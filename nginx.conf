# ─────────────────────────────────────────────────────────────
# Nginx config — pozosscz.com
#
# NOTA (producción):
#   1. Para habilitar HTTPS, instalar certbot y correr:
#        sudo certbot --nginx -d pozosscz.com -d www.pozosscz.com
#      Luego descomentar el bloque `server` HTTPS más abajo y reiniciar:
#        sudo nginx -t && sudo systemctl reload nginx
#   2. Hasta que haya certs, este archivo sirve HTTP puro (como antes).
#   3. Los headers de seguridad, rate limit, SSE buffering-off y
#      client_max_body_size aplican en ambos bloques.
# ─────────────────────────────────────────────────────────────

# Zonas de rate limit (10MB = ~160k IPs únicas)
limit_req_zone $binary_remote_addr zone=pozos_login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=pozos_api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=pozos_general:10m rate=120r/s;

upstream pozosscz_app {
    server 127.0.0.1:8004;
    keepalive 32;
}

# Redirect HTTP → HTTPS (activar cuando haya certs SSL)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name pozosscz.com www.pozosscz.com;
#     location /.well-known/acme-challenge/ { root /var/www/certbot; }
#     location / { return 301 https://$host$request_uri; }
# }

server {
    listen 80;
    listen [::]:80;
    server_name pozosscz.com www.pozosscz.com;

    # Tamaño máximo de request (subidas, JSON grande)
    client_max_body_size 10M;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # Headers de seguridad
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # CSP permisiva para Leaflet + OSRM + tiles + inline handlers del admin
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https: http://*.tile.openstreetmap.org https://*.tile.openstreetmap.org; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https: wss: ws:; font-src 'self' data:; frame-ancestors 'none';" always;

    # Gzip
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    location = /favicon.ico {
        alias /home/gonzalo/Django/pozosscz/staticfiles/favicon.ico;
        access_log off;
        log_not_found off;
    }

    location /static/ {
        autoindex off;
        alias /home/gonzalo/Django/pozosscz/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        autoindex off;
        alias /home/gonzalo/Django/pozosscz/media/;
    }

    # SSE en tiempo real: no bufferear, timeout largo
    location /maps/api/camiones-sse/ {
        proxy_pass http://pozosscz_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        chunked_transfer_encoding on;
    }

    # Rate limit para login (evitar brute force)
    location = /api/v1/auth/token/ {
        limit_req zone=pozos_login burst=5 nodelay;
        proxy_pass http://pozosscz_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
    }

    # Rate limit para cotización pública
    location = /api/v1/contratar/ {
        limit_req zone=pozos_api burst=10 nodelay;
        proxy_pass http://pozosscz_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
    }

    location / {
        limit_req zone=pozos_general burst=50 nodelay;
        proxy_pass http://pozosscz_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}

