# docker-compose.yml
services:
  redis:
    image: redis:alpine
    container_name: pozosscz_redis
    restart: unless-stopped
    command: >
      sh -c 'redis-server
      ${REDIS_PASSWORD:+--requirepass "$$REDIS_PASSWORD"}
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru'
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $$REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - pozos_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pozosscz_app
    restart: unless-stopped
    command: ./entrypoint.sh
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
      - ./logs:/app/logs
      # Secretos que NO van al repo (firebase-service-account.json, etc.)
      - ./secrets:/app/secrets:ro
    ports:
      - "8004:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - pozos_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

volumes:
  static:
  media:

networks:
  pozos_network:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.64.0/24
