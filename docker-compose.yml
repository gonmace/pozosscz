# docker-compose.yml
services:
  postgres:
    image: postgres:15-alpine
    container_name: pozosscz_db
    ports:
      - "5435:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - pozos_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  redis:
    image: redis:alpine
    container_name: pozosscz_redis
    networks:
      - pozos_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pozosscz_app
    command: ./entrypoint.sh
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    ports:
      - "8004:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - pozos_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

volumes:
  postgres_data:
  static:
  media:

networks:
  pozos_network:
